<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Music Player</div>
        <button id="theme-toggle" type="button">🌙 <span style="font-size: 0.8rem">Dark</span></button>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="search" placeholder="Search songs" />
        <button id="search-clear" type="button">✕</button>
      </div>

      <ul id="playlist-items" class="playlist-items"></ul>
    </aside>

    <main class="content">
      <section class="player">
        <div class="album-art">
          <img id="cover" src="music/covers/aradhya.jpg" alt="Track cover" />
        </div>

        <div class="song-info">
          <h2 id="song-title">Loading...</h2>
          <p id="song-artist">Please wait</p>
        </div>

        <div class="progress-container">
          <span id="current-time">0:00</span>
          <div id="progress-bar" class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
            <div id="progress-thumb" class="progress-thumb"></div>
          </div>
          <span id="duration">0:00</span>
        </div>

        <div class="controls">
          <button id="btn-shuffle" type="button" class="extra-btn">🔀</button>
          <button id="btn-prev" type="button" class="ctrl-btn">⏮</button>
          <button id="btn-play" type="button" class="ctrl-btn play-btn">▶</button>
          <button id="btn-next" type="button" class="ctrl-btn">⏭</button>
          <button id="btn-repeat" type="button" class="extra-btn">🔁</button>
        </div>

        <div class="volume-row">
          <div class="volume-control">
            <label for="volume">Volume</label>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
          </div>
        </div>

        <div class="extras">
          <div class="speed-control">
            <span class="speed-label">Speed</span>
            <div class="speed-pills">
              <button class="speed-btn" type="button" data-speed="0.5">0.5x</button>
              <button class="speed-btn active" type="button" data-speed="1">1x</button>
              <button class="speed-btn" type="button" data-speed="1.2">1.2x</button>
              <button class="speed-btn" type="button" data-speed="1.25">1.25x</button>
              <button class="speed-btn" type="button" data-speed="1.5">1.5x</button>
              <button class="speed-btn" type="button" data-speed="1.75">1.75x</button>
            </div>
          </div>
        </div>
      </section>

      <section class="all-songs">
        <div class="all-songs-title">Explore Tracks</div>
        <div id="songs-grid" class="songs-grid"></div>
      </section>
    </main>
  </div>

  <audio id="audio"></audio>
  <script src="app.js"></script>
</body>
</html>
